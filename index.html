<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0F0F0F;
    --paper:      #F9F7F2;
    --accent:     #C8392B;
    --accent2:    #1A3A5C;
    --muted:      #8A8780;
    --line:       #E0DDD6;
    --success:    #2D6A4F;
    --card:       #FFFFFF;
    --shadow:     0 2px 24px rgba(0,0,0,0.07);
  }
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 15% 50%, rgba(200,57,43,0.06) 0%, transparent 55%),
      radial-gradient(circle at 85% 20%, rgba(26,58,92,0.07) 0%, transparent 50%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
 
  /* ── HEADER ── */
  .page-header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
 
  .eyebrow {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
 
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    color: var(--ink);
    line-height: 1.1;
  }
 
  .page-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 4px;
  }
 
  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
 
  /* ── FORM BODY ── */
  .form-body {
    padding: 36px 40px 28px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }
 
  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
    position: relative;
  }
 
  label {
    font-size: 0.71rem;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--accent2);
  }
 
  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: textfield;
  }
 
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
 
  input:focus {
    border-color: var(--accent2);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,58,92,0.08);
  }
 
  input::placeholder { color: #C5C3BC; }
 
  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--line);
  }
 
  /* ── ACTIONS ── */
  .form-actions {
    padding: 20px 40px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 
  .btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
 
  .btn-submit:hover { background: #A8301F; }
  .btn-submit:active { transform: scale(0.99); }
 
  .btn-submit:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }
 
  /* spinner inside button */
  .btn-submit .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-submit.loading .btn-label { display: none; }
  .btn-submit.loading .spinner  { display: block; }
 
  @keyframes spin { to { transform: rotate(360deg); } }
 
  /* ── STATUS ── */
  .status-bar {
    display: none;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 0.83rem;
    font-weight: 500;
    text-align: center;
    animation: fadeIn 0.25s ease;
  }
 
  .status-bar.success {
    display: block;
    background: #EAF6F0;
    border: 1px solid #A8D5BE;
    color: var(--success);
  }
 
  .status-bar.error {
    display: block;
    background: #FDF2F1;
    border: 1px solid #F1B3AD;
    color: var(--accent);
  }
 
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
 
  /* ── TABLA HISTORIAL ── */
  .history-section {
    width: 100%;
    max-width: 560px;
    margin-top: 28px;
  }
 
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
 
  .history-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--ink);
  }
 
  .history-count {
    font-size: 0.75rem;
    color: var(--muted);
  }
 
  .history-table-wrap {
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    background: var(--card);
  }
 
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
  }
 
  thead tr {
    background: var(--accent2);
    color: #fff;
  }
 
  thead th {
    padding: 11px 14px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
 
  tbody tr {
    border-top: 1px solid var(--line);
    transition: background 0.12s;
  }
 
  tbody tr:hover { background: #F5F3EE; }
 
  tbody td {
    padding: 11px 14px;
    color: var(--ink);
    vertical-align: middle;
  }
 
  tbody td.num {
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
 
  .tag-producto {
    display: inline-block;
    padding: 2px 8px;
    background: rgba(26,58,92,0.08);
    color: var(--accent2);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }
 
  .no-rows td {
    text-align: center;
    color: var(--muted);
    padding: 24px;
    font-style: italic;
    font-size: 0.82rem;
  }
 
  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .form-body, .form-actions { padding-left: 24px; padding-right: 24px; }
    .page-title { font-size: 1.9rem; }
  }
 
  /* ── DECORATIVE CORNER ── */
  .card::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  }
</style>
</head>
<body>
 
<header class="page-header">
  <span class="eyebrow">Panel de ventas</span>
  <h1 class="page-title">Registro de Ventas</h1>
  <p class="page-subtitle">Completa el formulario y el registro se guardará automáticamente en Google Sheets.</p>
</header>
 
<div class="card">
  <div class="form-body">
 
    <div class="field">
      <label for="producto">Producto vendido</label>
      <input type="text" id="producto" placeholder="Ej. Camiseta talla M" autocomplete="off">
    </div>
 
    <div class="field">
      <label for="cantidad">Cantidad</label>
      <input type="number" id="cantidad" placeholder="0" min="1">
    </div>
 
    <div class="field">
      <label for="valor">Valor unitario ($)</label>
      <input type="number" id="valor" placeholder="0.00" min="0" step="0.01">
    </div>
 
  </div>
 
  <div class="divider"></div>
 
  <div class="form-actions">
    <button class="btn-submit" id="btnGuardar" onclick="guardarVenta()">
      <span class="btn-label">Guardar venta</span>
      <span class="spinner"></span>
    </button>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>
 
<!-- Historial local de la sesión -->
<div class="history-section">
  <div class="history-header">
    <span class="history-title">Registros de esta sesión</span>
    <span class="history-count" id="historyCount">0 ventas</span>
  </div>
  <div class="history-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Producto</th>
          <th style="text-align:right">Cant.</th>
          <th style="text-align:right">V. Unit.</th>
          <th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr class="no-rows">
          <td colspan="5">Aún no hay ventas registradas en esta sesión.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
 
<script>
  // ╔══════════════════════════════════════════════════════╗
  // ║  IMPORTANTE: pegá aquí la URL de tu Web App de       ║
  // ║  Google Apps Script después de desplegarla.          ║
  // ║  Ejecutar como: Yo | Acceso: Cualquiera              ║
  // ╚══════════════════════════════════════════════════════╝
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1RyaKuA3j7GaS-3R4duEzVebFWvHDBKdGo2P35qovmTDUxhOSPNkQJ89nFHyjPizt/exec';
 
  const ventas = [];
 
  function fmt(n) {
    return '$' + Number(n).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }
 
  function mostrarStatus(msg, tipo) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar ' + tipo;
  }
 
  function limpiarStatus() {
    const el = document.getElementById('statusBar');
    el.className = 'status-bar';
    el.textContent = '';
  }
 
  function agregarFilaHistorial(venta) {
    const tbody = document.getElementById('historyBody');
 
    // Quita la fila vacía si existe
    const noRows = tbody.querySelector('.no-rows');
    if (noRows) noRows.remove();
 
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${venta.hora}</td>
      <td><span class="tag-producto">${venta.producto}</span></td>
      <td class="num">${venta.cantidad}</td>
      <td class="num">${fmt(venta.valor)}</td>
      <td class="num"><strong>${fmt(venta.total)}</strong></td>
    `;
    tbody.prepend(tr);
 
    document.getElementById('historyCount').textContent =
      ventas.length + (ventas.length === 1 ? ' venta' : ' ventas');
  }
 
  async function guardarVenta() {
    limpiarStatus();
 
    const producto  = document.getElementById('producto').value.trim();
    const cantidad  = parseFloat(document.getElementById('cantidad').value);
    const valor     = parseFloat(document.getElementById('valor').value);
 
    // Validación básica
    if (!producto) { mostrarStatus('Por favor ingresá el nombre del producto.', 'error'); return; }
    if (!cantidad || cantidad <= 0) { mostrarStatus('La cantidad debe ser mayor a 0.', 'error'); return; }
    if (!valor || valor < 0)  { mostrarStatus('El valor debe ser 0 o mayor.', 'error'); return; }
 
    const total = cantidad * valor;
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-CO');
    const hora  = ahora.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
 
    const datos = { fecha, producto, cantidad, valor, total };
 
    // UI: loading
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.classList.add('loading');
 
    try {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        // Apps Script con doPost necesita text/plain para evitar preflight CORS
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(datos)
      });
 
      const json = await resp.json();
 
      if (json.ok) {
        mostrarStatus(`✓ Venta guardada correctamente en la fila ${json.fila}.`, 'success');
        ventas.push({ ...datos, hora });
        agregarFilaHistorial({ ...datos, hora });
        // Limpiar campos
        document.getElementById('producto').value  = '';
        document.getElementById('cantidad').value  = '';
        document.getElementById('valor').value     = '';
      } else {
        mostrarStatus('No se pudo guardar: ' + (json.error || 'error desconocido'), 'error');
      }
    } catch (e) {
      mostrarStatus('Error de conexión. Verificá la URL del Web App.', 'error');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
 
  // También guardar con Enter
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') {
      guardarVenta();
    }
  });
</script>
 
</body>
</html>
